name: Auto-publication réseaux sociaux

on:
  schedule:
    # Tourne toutes les 15 minutes
    - cron: '*/15 * * * *'
  # Permet aussi de déclencher manuellement depuis l'onglet Actions
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install requests

      - name: Lancer la publication automatique
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
        run: python scripts/autopublish.py

      - name: Sauvegarder les statuts mis à jour
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "auto-publish: statuts mis à jour [skip ci]"
          git push
