<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planification de Contenu – Dovozo & Influenceuse</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fdf6f0;
  --sidebar-bg: #fff0e8;
  --sidebar-font: 'DM Sans', sans-serif;
  --sidebar-color: #3a2a1e;
  --cal-bg: #fff;
  --cal-font: 'DM Sans', sans-serif;
  --cal-color: #3a2a1e;
  --cal-accent: #d4537e;
  --week-bg: #fff;
  --week-font: 'DM Serif Display', serif;
  --week-color: #3a2a1e;
  --day-bg: #fff;
  --day-font: 'DM Sans', sans-serif;
  --day-color: #3a2a1e;
  --day-header-bg: #fce8f3;
  --status-a-finaliser: #faeeda;
  --status-a-finaliser-color: #854f0b;
  --status-a-publier: #fbeaf0;
  --status-a-publier-color: #993556;
  --status-publie: #eaf3de;
  --status-publie-color: #3b6d11;
  --accent: #d4537e;
  --border: #e8d5cc;
  --text-muted: #9e7e6e;
  --shadow: 0 2px 16px rgba(212,83,126,0.07);
  --title-bg: #d4537e;
  --title-color: #ffffff;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--day-font);background:var(--bg);color:var(--day-color)}

/* PAGE TITLE */
.page-title-bar{height:62px;background:var(--title-bg);display:flex;align-items:center;justify-content:center;padding:0 28px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.10)}
.page-main-title{font-family:var(--week-font);font-size:30px;font-weight:700;color:var(--title-color);letter-spacing:-.01em;text-align:center}

/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:230px;min-width:230px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;font-family:var(--sidebar-font);color:var(--sidebar-color)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top-bar{padding:14px 20px 10px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;flex-shrink:0}
.scroll-area{flex:1;overflow-x:auto;overflow-y:auto;padding:16px 20px}

/* SIDEBAR */
.s-block{padding:14px 16px;border-bottom:1px solid var(--border)}
.s-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:6px}
.today-big{font-size:26px;font-weight:600;line-height:1;font-family:var(--sidebar-font)}
.today-sub{font-size:12px;color:var(--text-muted);margin-top:2px}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-family:var(--cal-font);color:var(--cal-color)}
.cal-nav button{background:none;border:none;cursor:pointer;font-size:16px;color:var(--cal-accent);padding:2px 6px;border-radius:4px}
.cal-nav button:hover{background:rgba(212,83,126,0.1)}
.cal-month{font-size:13px;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;font-family:var(--cal-font);color:var(--cal-color)}
.cal-hdr{font-size:9px;font-weight:600;text-align:center;color:var(--text-muted);padding:3px 0}
.cal-d{font-size:11px;text-align:center;padding:4px 2px;border-radius:5px;cursor:pointer;position:relative;transition:background .1s}
.cal-d:hover{background:rgba(212,83,126,0.12)}
.cal-d.today{background:var(--cal-accent);color:#fff;font-weight:700}
.cal-d.has-post::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--cal-accent);opacity:.8}
.cal-d.today::after{background:#fff}
.cal-d.dimmed{color:var(--text-muted)}

/* WEEKS */
.week-btn{display:flex;flex-direction:column;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all .15s;border:1px solid transparent;font-family:var(--sidebar-font);color:var(--sidebar-color)}
.week-btn:hover{background:rgba(212,83,126,0.08);border-color:rgba(212,83,126,0.2)}
.week-btn.active{background:rgba(212,83,126,0.12);border-color:var(--cal-accent)}
.week-btn-name{font-size:12px;font-weight:600}
.week-btn-dates{font-size:10px;color:var(--text-muted)}

/* TOP BAR */
.view-tabs{display:flex;gap:4px;background:rgba(212,83,126,0.08);border-radius:20px;padding:3px}
.vtab{padding:5px 14px;font-size:12px;border-radius:18px;cursor:pointer;transition:all .15s;font-weight:500;border:none;background:none;color:var(--text-muted);font-family:var(--day-font)}
.vtab.active{background:#fff;color:var(--accent);box-shadow:0 1px 6px rgba(0,0,0,.08)}
.settings-btn{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:#fff;font-size:12px;cursor:pointer;font-family:var(--day-font);color:var(--day-color);transition:all .15s}
.settings-btn:hover{border-color:var(--accent);color:var(--accent)}
.main-title{font-size:16px;font-weight:600;font-family:var(--week-font);color:var(--week-color)}

/* HORIZONTAL DAY COLUMNS */
.days-strip{display:flex;gap:12px;min-width:max-content;align-items:stretch;height:100%;padding-bottom:8px}
.day-col{width:200px;min-width:200px;background:var(--day-bg);border-radius:12px;border:1px solid var(--border);display:flex;flex-direction:column;box-shadow:var(--shadow);font-family:var(--day-font);color:var(--day-color);height:100%}
.day-col.is-today .dcol-header{color:#fff}
.dcol-header{background:var(--day-header-bg);padding:10px 12px;border-radius:12px 12px 0 0;border-bottom:1px solid var(--border);flex-shrink:0}
.dcol-dayname{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;opacity:.8}
.dcol-date{font-size:20px;font-weight:700;line-height:1.1;font-family:var(--week-font);color:inherit}
.dcol-body{padding:10px;flex:1;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.add-btn{width:100%;padding:7px;border:1.5px dashed var(--border);border-radius:8px;background:none;cursor:pointer;font-size:12px;color:var(--text-muted);font-family:var(--day-font);transition:all .15s;flex-shrink:0}
.add-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(212,83,126,.04)}

/* POST CARD - ALIGNEMENT PARFAIT ET HAUTEUR FIXE */
.post-card{
  border:1px solid var(--border);
  border-radius:10px;
  background:#fff;
  position:relative;
  display:flex;
  flex-direction:column;
  height:440px; /* HAUTEUR FIXE POUR ALIGNEMENT */
  overflow:hidden; /* Cache le débordement externe */
  flex-shrink:0; /* Empêche le rétrécissement */
  cursor:pointer; /* Indique qu'on peut cliquer */
  transition:box-shadow .15s;
}
.post-card:hover{box-shadow:0 4px 16px rgba(212,83,126,.15)}
.pc-img{position:relative;width:100%;height:140px;background:#f5e8f0;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.pc-img img{width:100%;height:100%;object-fit:cover}
.pc-img-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.85);border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;z-index:5}
.pc-img-nav.left{left:4px}.pc-img-nav.right{right:4px}
.pc-img-count{position:absolute;bottom:4px;right:6px;font-size:9px;background:rgba(0,0,0,.4);color:#fff;padding:1px 5px;border-radius:10px;z-index:5}
.pc-no-img{font-size:11px;color:var(--text-muted)}

.pc-body{
  padding:8px 10px;
  display:flex;
  flex-direction:column;
  gap:4px;
  flex:1;
  overflow-y:auto; /* SCROLL INTERNE SI TROP DE CONTENU */
}
/* Scrollbar subtile */
.pc-body::-webkit-scrollbar{width:4px}
.pc-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.pc-status{display:block;text-align:center;font-size:10px;font-weight:700;padding:3px 0;border-radius:6px;margin-bottom:4px;flex-shrink:0}
.st-0{background:var(--status-a-finaliser);color:var(--status-a-finaliser-color)}
.st-1{background:var(--status-a-publier);color:var(--status-a-publier-color)}
.st-2{background:var(--status-publie);color:var(--status-publie-color)}
.pc-net{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0}
.net-ig{background:#fce4f3;color:#993556}
.net-li{background:#e3edf8;color:#185fa5}
.net-tt{background:#dff5ee;color:#0f6e56}
.pc-title{font-size:12px;font-weight:700;margin-bottom:2px;line-height:1.3;flex-shrink:0}
.pc-desc{font-size:10px;color:var(--text-muted);line-height:1.4;margin-bottom:4px;min-height:45px; /* FORCE LA TAILLE MÊME VIDE */ display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.pc-tags{font-size:9px;color:var(--accent);margin-bottom:2px;word-break:break-all;line-height:1.3;flex-shrink:0}
.pc-todos{display:flex;flex-direction:column;gap:2px}
.todo-row{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:10px;line-height:1.2}
.todo-row.done span{text-decoration:line-through;color:var(--text-muted)}
.todo-cb{width:12px;height:12px;border-radius:3px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .1s;font-size:9px}
.todo-cb.chk{background:var(--accent);border-color:var(--accent);color:#fff}

/* DELETE AND EDIT ICONS */
.pc-del{position:absolute;top:6px;right:6px;background:rgba(255,255,255,.97);border:1.5px solid #f5c0c0;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:14px;color:#c0392b;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 1px 5px rgba(0,0,0,.13);transition:all .15s;opacity:0;z-index:10}
.pc-edit{position:absolute;top:6px;right:36px;background:rgba(255,255,255,.97);border:1.5px solid #b8d4f5;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:13px;color:#2471c8;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 5px rgba(0,0,0,.13);transition:all .15s;opacity:0;z-index:10}
.post-card:hover .pc-del, .post-card:hover .pc-edit{opacity:1}
.pc-del:hover{background:#ffeaea;border-color:#c0392b;transform:scale(1.1)}
.pc-edit:hover{background:#eaf2ff;border-color:#2471c8;transform:scale(1.1)}

/* MODAL - GRAND FORMAT */
.overlay{display:none;position:fixed;inset:0;background:rgba(40,15,25,.45);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:650px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.18);font-family:var(--day-font)}
.modal-header{padding:18px 24px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:18px;font-weight:600;font-family:var(--week-font)}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-muted);padding:2px 8px;border-radius:6px}
.modal-close:hover{background:#f5f0ec}
.modal-body{padding:20px 24px}
.frow{margin-bottom:16px}
.frow label{font-size:11px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.frow input,.frow textarea,.frow select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--day-font);color:var(--day-color);background:#fdfcfb;transition:border .15s;outline:none}
.frow input:focus,.frow textarea:focus,.frow select:focus{border-color:var(--accent)}
.frow textarea{resize:vertical;min-height:80px}
.img-zone{border:2px dashed var(--border);border-radius:10px;min-height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:border .15s;background:#fdfaf8}
.img-zone:hover{border-color:var(--accent)}
.img-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-zone-label{font-size:13px;color:var(--text-muted);text-align:center;padding:14px}
.img-previews{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.img-prev-wrap{position:relative;width:90px;height:90px;border-radius:8px;overflow:hidden;flex-shrink:0;border:1px solid var(--border)}
.img-prev-wrap img{width:100%;height:100%;object-fit:cover}
.img-prev-del{position:absolute;top:2px;right:2px;background:rgba(255,255,255,.9);border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;color:#666}
.status-btns{display:flex;gap:6px;flex-wrap:wrap}
.status-opt{padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;background:none;font-family:var(--day-font)}
.status-opt.sel-0{background:var(--status-a-finaliser);color:var(--status-a-finaliser-color);border-color:var(--status-a-finaliser-color)}
.status-opt.sel-1{background:var(--status-a-publier);color:var(--status-a-publier-color);border-color:var(--status-a-publier-color)}
.status-opt.sel-2{background:var(--status-publie);color:var(--status-publie-color);border-color:var(--status-publie-color)}
.todos-section{margin-top:10px;border:1px solid var(--border);border-radius:8px;padding:12px}
.todos-title{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px}
.todo-input-row{display:flex;gap:6px}
.todo-input-row input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--day-font);outline:none}
.todo-input-row input:focus{border-color:var(--accent)}
.todo-add-btn{padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.todo-list{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.todo-edit-row{display:flex;align-items:center;gap:8px;font-size:13px}
.todo-edit-row .todo-cb{cursor:pointer}
.todo-edit-del{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:12px;margin-left:auto}
.modal-footer{padding:14px 24px 18px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--border)}
.btn-cancel{padding:10px 20px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:13px;cursor:pointer;font-family:var(--day-font);color:var(--day-color)}
.btn-save{padding:10px 24px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--day-font)}

/* SETTINGS PANEL */
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(40,15,25,.35);z-index:300;align-items:flex-end;justify-content:flex-end}
.settings-overlay.open{display:flex}
.settings-panel{background:#fff;width:340px;height:100vh;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.12);padding:20px;font-family:var(--day-font)}
.sp-title{font-size:17px;font-weight:700;margin-bottom:18px;font-family:var(--week-font)}
.sp-section{margin-bottom:20px;padding:14px;border:1px solid var(--border);border-radius:10px}
.sp-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);margin-bottom:12px}
.sp-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.sp-row label{font-size:12px;color:var(--day-color);flex:1}
.sp-row input[type=color]{width:36px;height:28px;border:1px solid var(--border);border-radius:6px;cursor:pointer;padding:2px;background:none}
.sp-row select{padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--day-font);background:#fff;outline:none}
.sp-reset{width:100%;margin-top:10px;padding:8px;border:1px solid var(--border);border-radius:8px;background:none;cursor:pointer;font-size:12px;color:var(--text-muted);font-family:var(--day-font)}
.sp-reset:hover{border-color:var(--accent);color:var(--accent)}
.sp-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted)}

/* ── MOBILE ──────────────────────────────────────────────────────────────── */
@media (max-width: 768px) {

  /* Titre */
  .page-main-title { font-size: 20px; }
  .page-title-bar { height: 48px; padding: 0 12px; }

  /* Profile tabs */
  .profile-tabs-bar { padding: 0 8px 6px; gap: 6px; }
  .profile-tab { font-size: 11px; padding: 4px 12px; }

  /* Layout principal : sidebar cachée par défaut */
  .app { flex-direction: column; height: auto; overflow: visible; }
  .sidebar {
    display: none;
    width: 100%;
    min-width: 0;
    border-right: none;
    border-bottom: 1px solid var(--border);
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 500;
    overflow-y: auto;
    background: var(--sidebar-bg);
  }
  .sidebar.open { display: flex; flex-direction: column; }
  .sidebar-close-btn {
    display: flex !important;
  }
  .main { width: 100%; }

  /* Top bar */
  .top-bar {
    padding: 8px 12px;
    gap: 6px;
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
  }
  .top-bar > div:last-child {
    flex-wrap: wrap;
    gap: 5px;
  }
  .view-tabs { gap: 2px; }
  .vtab { padding: 4px 10px; font-size: 11px; }
  .filter-bar { display: none; } /* caché sur mobile, trop encombrant */
  .settings-btn { padding: 5px 10px; font-size: 11px; }

  /* Masquer les boutons secondaires sur mobile */
  #autoSaveBtn { display: none; }
  #autoSaveStatus { display: none !important; }

  /* Colonnes de jours */
  .scroll-area { padding: 8px 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .days-strip { gap: 8px; }
  .day-col { width: 85vw; min-width: 85vw; }

  /* Modales plein écran */
  .modal {
    width: 100%;
    max-width: 100%;
    height: 100dvh;
    max-height: 100dvh;
    border-radius: 0;
    margin: 0;
    overflow-y: auto;
  }
  .overlay { align-items: flex-start; }
  .settings-panel { width: 100%; height: 100dvh; }

  /* Idées : colonne unique */
  .ideas-layout { flex-direction: column; }

  /* Recap */
  .recap-cards { gap: 8px; }
  .recap-card { min-width: 90px; padding: 10px 12px; }
  .recap-card-num { font-size: 24px; }

  /* Badge aujourd'hui */
  .main-title { font-size: 13px; }
}

/* Bouton hamburger & fermer sidebar */
.hamburger-btn {
  display: none;
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 5px 10px;
  cursor: pointer;
  font-size: 16px;
  color: var(--day-color);
}
.sidebar-close-btn {
  display: none;
  position: sticky;
  top: 0;
  background: var(--sidebar-bg);
  border: none;
  font-size: 20px;
  padding: 12px 16px;
  cursor: pointer;
  color: var(--text-muted);
  text-align: right;
  width: 100%;
  z-index: 10;
  border-bottom: 1px solid var(--border);
}
@media (max-width: 768px) {
  .hamburger-btn { display: inline-flex; align-items: center; gap: 4px; }
}

/* Overlay sidebar mobile */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 499;
}
.sidebar-overlay.open { display: block; }

/* PROFILE TABS */
.profile-tabs-bar{display:flex;align-items:center;justify-content:center;gap:4px;background:var(--title-bg);padding:0 28px 8px;flex-shrink:0}
.profile-tab{padding:5px 18px;font-size:12px;font-weight:600;font-family:var(--day-font);border:none;cursor:pointer;border-radius:20px;transition:all .18s;color:rgba(255,255,255,.55);background:transparent;letter-spacing:.01em}
.profile-tab.active-inf{background:rgba(255,255,255,.22);color:#fff}
.profile-tab.active-dov{background:rgba(255,255,255,.22);color:#fff}
.profile-tab:not(.active-inf):not(.active-dov):hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.85)}

/* TODAY BADGE */
.today-badge{margin-top:8px;background:var(--accent);color:#fff;border-radius:8px;padding:7px 10px;font-size:11px;font-weight:600;display:none}
.today-badge.visible{display:block}
.today-badge-count{font-size:18px;font-weight:700;line-height:1}

/* FILTERS */
.filter-bar{display:flex;gap:6px;align-items:center}
.filter-select{padding:5px 10px;border:1px solid var(--border);border-radius:20px;font-size:11px;font-family:var(--day-font);color:var(--day-color);background:#fff;cursor:pointer;outline:none;transition:border .15s}
.filter-select:focus{border-color:var(--accent)}

/* POST TIME */
.pc-time{font-size:10px;font-weight:700;color:var(--accent);flex-shrink:0}
.pc-url{font-size:10px;color:#2471c8;word-break:break-all;margin-top:2px}
.pc-url a{color:#2471c8;text-decoration:none}
.pc-url a:hover{text-decoration:underline}

/* DUPLICATE BUTTON */
.pc-dup{position:absolute;top:6px;right:66px;background:rgba(255,255,255,.97);border:1.5px solid #d4e8c2;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:12px;color:#3b6d11;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 5px rgba(0,0,0,.13);transition:all .15s;opacity:0;z-index:10}
.post-card:hover .pc-dup{opacity:1}
.pc-dup:hover{background:#eafad4;border-color:#3b6d11;transform:scale(1.1)}

/* DRAG & DROP */
.post-card[draggable=true]{cursor:grab}
.post-card.dragging{opacity:.4;cursor:grabbing}
.day-col.drag-over .dcol-header{outline:2px dashed var(--accent);outline-offset:-2px;border-radius:12px 12px 0 0}
.week-btn.drag-hover{background:rgba(212,83,126,0.18);border-color:var(--accent);transform:scale(1.03);transition:all .15s}
.week-btn.drag-hover .week-btn-name{color:var(--accent)}
.drag-week-indicator{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:9px 20px;border-radius:20px;font-size:12px;font-weight:600;font-family:var(--day-font);box-shadow:0 4px 16px rgba(0,0,0,.2);pointer-events:none;z-index:999;opacity:0;transition:opacity .2s}
.drag-week-indicator.visible{opacity:1}

/* IDEAS VIEW */
.ideas-layout{display:flex;gap:16px;width:100%;padding:4px 0;box-sizing:border-box}
.ideas-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:12px}
.ideas-col-title{font-size:13px;font-weight:700;font-family:var(--week-font);color:var(--week-color);padding-bottom:8px;border-bottom:2px solid var(--accent)}
.idea-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:var(--shadow);position:relative;transition:box-shadow .15s}
.idea-card:hover{box-shadow:0 4px 16px rgba(212,83,126,.15)}
.idea-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.idea-card-title{font-size:13px;font-weight:700;color:var(--day-color);flex:1;line-height:1.3}
.idea-card-actions{display:flex;gap:4px;flex-shrink:0}
.idea-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:var(--day-font);color:var(--text-muted);transition:all .15s;white-space:nowrap}
.idea-btn:hover{border-color:var(--accent);color:var(--accent)}
.idea-btn.plan{background:var(--accent);color:#fff;border-color:var(--accent)}
.idea-btn.plan:hover{opacity:.85}
.idea-btn.del{color:#c0392b;border-color:#f5c0c0}
.idea-btn.del:hover{background:#ffeaea;border-color:#c0392b}
.idea-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.idea-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:#f5eef8;color:#7a3fa0}
.idea-desc{font-size:12px;color:var(--text-muted);line-height:1.5;white-space:pre-wrap}
.idea-add-btn{width:100%;padding:10px;border:1.5px dashed var(--border);border-radius:10px;background:none;cursor:pointer;font-size:12px;color:var(--text-muted);font-family:var(--day-font);transition:all .15s}
.idea-add-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(212,83,126,.04)}

/* IDEA MODAL */
.idea-overlay{display:none;position:fixed;inset:0;background:rgba(40,15,25,.45);z-index:200;align-items:center;justify-content:center}
.idea-overlay.open{display:flex}

/* PLAN MODAL (date picker) */
.plan-overlay{display:none;position:fixed;inset:0;background:rgba(40,15,25,.45);z-index:250;align-items:center;justify-content:center}
.plan-overlay.open{display:flex}
.plan-modal{background:#fff;border-radius:14px;padding:24px;width:340px;box-shadow:0 8px 40px rgba(0,0,0,.18);font-family:var(--day-font)}
.plan-modal h3{font-size:16px;font-weight:700;font-family:var(--week-font);margin-bottom:16px}
.plan-modal input[type=date]{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--day-font);outline:none;margin-bottom:16px}
.plan-modal input[type=date]:focus{border-color:var(--accent)}
.plan-modal-footer{display:flex;gap:10px;justify-content:flex-end}

/* RECAP VIEW */
.recap-grid{display:flex;flex-direction:column;gap:20px;padding:4px 0}
.recap-section-title{font-size:13px;font-weight:700;font-family:var(--week-font);color:var(--week-color);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.recap-cards{display:flex;gap:12px;flex-wrap:wrap}
.recap-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 18px;min-width:130px;box-shadow:var(--shadow);text-align:center}
.recap-card-num{font-size:32px;font-weight:700;font-family:var(--week-font);color:var(--accent);line-height:1}
.recap-card-label{font-size:11px;color:var(--text-muted);margin-top:4px;font-weight:500}
.recap-card.st0{border-top:3px solid var(--status-a-finaliser-color)}
.recap-card.st1{border-top:3px solid var(--status-a-publier-color)}
.recap-card.st2{border-top:3px solid var(--status-publie-color)}
.recap-period{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.recap-period-btn{padding:5px 14px;border:1px solid var(--border);border-radius:20px;font-size:11px;cursor:pointer;font-family:var(--day-font);background:#fff;color:var(--text-muted);transition:all .15s}
.recap-period-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>
<body>

<script>
const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS_FULL=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const DAYS_SHORT=['L','M','M','J','V','S','D'];
const NET_LABELS={ig:'Instagram',li:'LinkedIn',tt:'TikTok',bl:'Blog'};
const STATUS_LABELS=['À finaliser','À publier','Publié'];

const PROFILES = {
  influenceuse: {
    label: 'Influenceuse',
    networks: [
      {value:'bl', label:'Blog'},
      {value:'ig', label:'Instagram'},
      {value:'tt', label:'TikTok'}
    ],
    storageKey: 'cp_posts_inf',
    imagesKey: 'cp_images_inf',
    accentColor: '#d4537e',
    titleBg: '#d4537e',
    dayHeaderBg: '#fce8f3'
  },
  dovozo: {
    label: 'Dovozo',
    networks: [
      {value:'li', label:'LinkedIn'},
      {value:'ig', label:'Instagram'},
      {value:'tt', label:'TikTok'}
    ],
    storageKey: 'cp_posts_dov',
    imagesKey: 'cp_images_dov',
    accentColor: '#1a5fa8',
    titleBg: '#1a5fa8',
    dayHeaderBg: '#ddeeff'
  }
};

// Add blog style for network badge
const extraNetStyle = document.createElement('style');
extraNetStyle.textContent = `.net-bl{background:#ffe9c2;color:#7a4a00}`;
document.head.appendChild(extraNetStyle);

let currentProfile = 'influenceuse';
let activeFilters = { net: '', status: '' };
let dragState = null;
let dragWeekTimer = null;

function switchProfile(profileKey) {
  currentProfile = profileKey;
  const prof = PROFILES[profileKey];
  document.getElementById('tabInf').className = 'profile-tab' + (profileKey==='influenceuse' ? ' active-inf' : '');
  document.getElementById('tabDov').className = 'profile-tab' + (profileKey==='dovozo' ? ' active-dov' : '');
  document.documentElement.style.setProperty('--accent', prof.accentColor);
  document.documentElement.style.setProperty('--cal-accent', prof.accentColor);
  document.documentElement.style.setProperty('--title-bg', prof.titleBg);
  document.documentElement.style.setProperty('--day-header-bg', prof.dayHeaderBg);
  posts = loadPosts();
  updateNetworkOptions();
  updateFilterNetOptions();
  renderSidebar();
  renderMain();
  updateTodayBadge();
}

function updateNetworkOptions(selectedVal) {
  const sel = document.getElementById('f_net');
  const prof = PROFILES[currentProfile];
  sel.innerHTML = '';
  prof.networks.forEach(n => {
    const opt = document.createElement('option');
    opt.value = n.value;
    opt.textContent = n.label;
    if(selectedVal && n.value === selectedVal) opt.selected = true;
    sel.appendChild(opt);
  });
}

function updateFilterNetOptions() {
  const sel = document.getElementById('filterNet');
  const prof = PROFILES[currentProfile];
  sel.innerHTML = '<option value="">Tous les réseaux</option>';
  prof.networks.forEach(n => {
    const opt = document.createElement('option');
    opt.value = n.value;
    opt.textContent = n.label;
    if(activeFilters.net === n.value) opt.selected = true;
    sel.appendChild(opt);
  });
}

function applyFilters() {
  activeFilters.net = document.getElementById('filterNet').value;
  activeFilters.status = document.getElementById('filterStatus').value;
  renderMain();
}

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function updateTodayBadge() {
  const key = fmtDate(today);
  const todayPosts = posts[key] || [];
  const toPublish = todayPosts.filter(p => p.status === 1).length;
  const badge = document.getElementById('todayBadge');
  document.getElementById('todayBadgeCount').textContent = toPublish;
  badge.classList.toggle('visible', toPublish > 0);
}


let today=new Date();today.setHours(0,0,0,0);
let viewMonth=new Date(today.getFullYear(),today.getMonth(),1);
let selectedWeek=getMonday(today);
let currentView='week';
let posts=loadPosts();
let theme=loadTheme();

let editingDay=null,editingIdx=null;
let modalImages=[];
let modalTodos=[];
let modalStatus=0;

const THEME_CONFIG = [
  {
    title: "Général",
    keys: [
      { var: '--bg', label: 'Arrière-plan global' },
      { var: '--title-bg', label: 'Barre de titre' },
      { var: '--title-color', label: 'Texte titre' },
      { var: '--border', label: 'Bordures' }
    ]
  },
  {
    title: "Sidebar",
    keys: [
      { var: '--sidebar-bg', label: 'Fond Sidebar' },
      { var: '--sidebar-color', label: 'Texte Sidebar' },
      { var: '--text-muted', label: 'Texte secondaire' }
    ]
  },
  {
    title: "Calendrier",
    keys: [
      { var: '--cal-accent', label: 'Accent Calendrier' },
      { var: '--cal-color', label: 'Texte Calendrier' }
    ]
  },
  {
    title: "Jours & Cartes",
    keys: [
      { var: '--day-bg', label: 'Fond des cartes' },
      { var: '--day-color', label: 'Texte des cartes' },
      { var: '--day-header-bg', label: 'En-tête jour' }
    ]
  },
  {
    title: "Accents & Actions",
    keys: [
      { var: '--accent', label: 'Boutons & Liens' },
      { var: '--shadow', label: 'Ombres (Hex RGBA)' }
    ]
  },
  {
    title: "Statuts",
    keys: [
      { var: '--status-a-finaliser', label: 'Fond "À finaliser"' },
      { var: '--status-a-finaliser-color', label: 'Texte "À finaliser"' },
      { var: '--status-a-publier', label: 'Fond "À publier"' },
      { var: '--status-a-publier-color', label: 'Texte "À publier"' },
      { var: '--status-publie', label: 'Fond "Publié"' },
      { var: '--status-publie-color', label: 'Texte "Publié"' }
    ]
  }
];

const DAY_COLORS_KEY = 'cp_day_colors';
const DAY_NAMES_FULL = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
let dayColors = loadDayColors();

function loadDayColors(){
  try{ return JSON.parse(localStorage.getItem(DAY_COLORS_KEY)||'{}'); }catch{ return {}; }
}
function saveDayColors(){
  localStorage.setItem(DAY_COLORS_KEY, JSON.stringify(dayColors));
}
function getDayColor(dayIndex){
  return dayColors[dayIndex] || null;
}
function applyDayColors(){
  document.querySelectorAll('.day-col').forEach(col => {
    const bodyEl = col.querySelector('[id^="body_"]');
    if(!bodyEl) return;
    const key = bodyEl.id.replace('body_','');
    const d = new Date(key);
    const dayIndex = d.getDay();
    const color = getDayColor(dayIndex);
    const header = col.querySelector('.dcol-header');
    const body = col.querySelector('.dcol-body');
    const isToday = col.classList.contains('is-today');
    if(color){
      col.style.borderColor = color;
      if(header) header.style.background = color;
      if(body) body.style.background = color + '22';
    } else {
      col.style.borderColor = '';
      if(header) header.style.background = isToday ? 'var(--accent)' : '';
      if(body) body.style.background = '';
    }
  });
}

function renderSettingsColors() {
  const container = document.getElementById('themeSettingsContainer');
  container.innerHTML = '';
  THEME_CONFIG.forEach(group => {
    const section = document.createElement('div');
    section.className = 'sp-section';
    const title = document.createElement('div');
    title.className = 'sp-section-title';
    title.textContent = group.title;
    section.appendChild(title);
    group.keys.forEach(item => {
      const row = document.createElement('div');
      row.className = 'sp-row';
      const currentVal = theme[item.var] || getComputedStyle(document.documentElement).getPropertyValue(item.var).trim();
      let colorVal = currentVal;
      const label = document.createElement('label');
      label.textContent = item.label;
      label.setAttribute('for', 'color-'+item.var);
      const input = document.createElement('input');
      input.type = 'color';
      input.id = 'color-'+item.var;
      input.value = rgbToHex(colorVal);
      input.addEventListener('input', (e) => {
        document.documentElement.style.setProperty(item.var, e.target.value);
        saveTheme(item.var, e.target.value);
      });
      row.appendChild(label);
      row.appendChild(input);

    });

  const dayOrder = [1,2,3,4,5,6,0];
  dayOrder.forEach(dayIndex => {
    const row = document.createElement('div');
    row.className = 'sp-row';

    input.addEventListener('input', (e) => {
      input.style.opacity = '1';
      dayColors[dayIndex] = e.target.value;
      saveDayColors();
      applyDayColors();
    });

    const resetBtn = document.createElement('button');
    resetBtn.textContent = '↺';
    resetBtn.title = 'Réinitialiser';
    resetBtn.style.cssText = 'background:none;border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:12px;padding:2px 6px;color:var(--text-muted)';
    resetBtn.addEventListener('click', () => {
      delete dayColors[dayIndex];
      saveDayColors();
      input.value = '#fce8f3';
      input.style.opacity = '0.45';
      applyDayColors();
    });

    inputWrap.appendChild(input);
    inputWrap.appendChild(resetBtn);
    row.appendChild(label);
    row.appendChild(inputWrap);
    daySection.appendChild(row);
  });

  container.appendChild(daySection);
}

function rgbToHex(col) {
  if(col.charAt(0)=='#') return col;
  const rgb = col.match(/\d+/g);
  if(!rgb) return '#000000';
  return "#" + ((1 << 24) + (parseInt(rgb[0]) << 16) + (parseInt(rgb[1]) << 8) + parseInt(rgb[2])).toString(16).slice(1);
}

function fmtDate(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function pad(n){return String(n).padStart(2,'0')}
function addDays(d,n){let r=new Date(d);r.setDate(r.getDate()+n);return r}
function getMonday(d){let r=new Date(d);let day=r.getDay();let diff=day===0?-6:1-day;r.setDate(r.getDate()+diff);r.setHours(0,0,0,0);return r}

function getWeeksOfMonth(y,m){
  let weeks=[],first=new Date(y,m,1),last=new Date(y,m+1,0);
  let mon=getMonday(first);
  while(mon<=last){weeks.push({start:new Date(mon),end:addDays(mon,6)});mon=addDays(mon,7);}
  return weeks;
}

function renderCal(){
  let g=document.getElementById('calGrid');g.innerHTML='';
  DAYS_SHORT.forEach(h=>{let el=document.createElement('div');el.className='cal-hdr';el.textContent=h;g.appendChild(el);});
  let y=viewMonth.getFullYear(),m=viewMonth.getMonth();
  let first=new Date(y,m,1);
  let offset=first.getDay()===0?6:first.getDay()-1;
  for(let i=0;i<offset;i++){let el=document.createElement('div');el.className='cal-d dimmed';el.textContent=' ';g.appendChild(el);}
  let days=new Date(y,m+1,0).getDate();
  for(let d=1;d<=days;d++){
    let dt=new Date(y,m,d);
    let key=fmtDate(dt);
    let el=document.createElement('div');
    el.className='cal-d'+(fmtDate(dt)===fmtDate(today)?' today':'')+(posts[key]&&posts[key].length?' has-post':'');
    el.textContent=d;
    el.onclick=()=>{selectedWeek=getMonday(dt);viewMonth=new Date(dt.getFullYear(),dt.getMonth(),1);renderSidebar();renderMain();};
    g.appendChild(el);
  }

function renderWeekShortcuts(){
  let ws=getWeeksOfMonth(viewMonth.getFullYear(),viewMonth.getMonth());
  let c=document.getElementById('weekShortcuts');c.innerHTML='';
  ws.forEach((w,i)=>{
    let btn=document.createElement('div');
    btn.className='week-btn'+(fmtDate(w.start)===fmtDate(selectedWeek)?' active':'');
    let isNow=today>=w.start&&today<=w.end;
    btn.innerHTML=`<span class="week-btn-name">Semaine ${i+1}${isNow?' •':''}</span><span class="week-btn-dates">${w.start.getDate()} ${MONTHS[w.start.getMonth()].substring(0,3)} – ${w.end.getDate()} ${MONTHS[w.end.getMonth()].substring(0,3)}</span>`;
    btn.onclick=()=>{selectedWeek=new Date(w.start);renderMain();renderWeekShortcuts();};

    btn.addEventListener('dragover',(e)=>{
      if(!dragState) return;
      e.preventDefault();
      btn.classList.add('drag-hover');
      showDragIndicator('Maintiens pour aller à cette semaine…');
      if(!dragWeekTimer){
        dragWeekTimer=setTimeout(()=>{
          selectedWeek=new Date(w.start);
          viewMonth=new Date(w.start.getFullYear(),w.start.getMonth(),1);
          if(currentView!=='week'){
            currentView='week';
            document.querySelectorAll('.vtab').forEach(t=>t.classList.toggle('active',t.textContent.includes('Semaine')));
          }
          renderMain();
          renderWeekShortcuts();
          showDragIndicator('Dépose le post sur le jour souhaité ✓');
        },500);
      }
    });
    btn.addEventListener('dragleave',()=>{
      btn.classList.remove('drag-hover');
      clearTimeout(dragWeekTimer);
      dragWeekTimer=null;
      hideDragIndicator();
    });
    btn.addEventListener('drop',(e)=>{
      e.preventDefault();
      btn.classList.remove('drag-hover');
      clearTimeout(dragWeekTimer);
      dragWeekTimer=null;
      hideDragIndicator();
      // Navigate to the week; post stays in dragState for drop on a day
      selectedWeek=new Date(w.start);
      viewMonth=new Date(w.start.getFullYear(),w.start.getMonth(),1);
      if(currentView!=='week'){
        currentView='week';
        document.querySelectorAll('.vtab').forEach(t=>t.classList.toggle('active',t.textContent.includes('Semaine')));
      }
      renderMain();
      renderWeekShortcuts();
    });

    c.appendChild(btn);
  });
}

function renderDayPosts(key){
  let body=document.getElementById('body_'+key);
  if(!body)return;
  let addBtn=body.querySelector('.add-btn');
  body.querySelectorAll('.post-card').forEach(c=>c.remove());
  let ps=(posts[key]||[])
    .map((p,i)=>({p,i}))
    .filter(({p})=>{
      if(activeFilters.net && p.network !== activeFilters.net) return false;
      if(activeFilters.status !== '' && String(p.status) !== activeFilters.status) return false;
      return true;
    })
    .sort((a,b)=>{
      if(!a.p.time && !b.p.time) return 0;
      if(!a.p.time) return 1;
      if(!b.p.time) return -1;
      return a.p.time.localeCompare(b.p.time);
    });
  ps.forEach(({p,i})=>{
    let card=createPostCard(p,key,i);
    body.insertBefore(card,addBtn);
  });
}

function compressImage(base64) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.7));
    };
    img.onerror = () => resolve(base64); // fallback sans compression
    img.src = base64;
  });
}

function addImages(e){
  let files=Array.from(e.target.files);
  let readers=files.map(f=>new Promise(res=>{
    let r=new FileReader();r.onload=ev=>res(ev.target.result);r.readAsDataURL(f);
  }));
  Promise.all(readers).then(async results=>{
    const compressed = await Promise.all(results.map(compressImage));
    modalImages.push(...compressed);
    renderImgPreviews();
  });
  e.target.value='';
}

function renderMain(){
  let strip=document.getElementById('daysStrip');strip.innerHTML='';
  let title=document.getElementById('mainTitle');

  if(currentView==='recap'){
    strip.style.flexDirection='column';
    strip.style.minWidth='unset';
    title.textContent='Récapitulatif';
    renderRecap(strip);
    return;
  }

  if(currentView==='ideas'){
    setView_ideas();
    return;
  }

  strip.style.flexDirection='';
  strip.style.minWidth='';

  let days=[];
  if(currentView==='week'){
    title.textContent='Semaine du '+selectedWeek.getDate()+' '+MONTHS[selectedWeek.getMonth()]+' '+selectedWeek.getFullYear();
    for(let i=0;i<7;i++)days.push(addDays(selectedWeek,i));
  } else {
    let y=viewMonth.getFullYear(),m=viewMonth.getMonth();
    title.textContent=MONTHS[m]+' '+y;
    let n=new Date(y,m+1,0).getDate();
    for(let d=1;d<=n;d++)days.push(new Date(y,m,d));
  }
  days.forEach(d=>{
    let key=fmtDate(d);
    let col=document.createElement('div');
    col.className='day-col'+(fmtDate(d)===fmtDate(today)?' is-today':'');
    let dowFull=DAYS_FULL[d.getDay()];
    col.innerHTML=`<div class="dcol-header"><div class="dcol-dayname">${dowFull}</div><div class="dcol-date">${d.getDate()} ${MONTHS[d.getMonth()].substring(0,3)}</div></div><div class="dcol-body" id="body_${key}"><button class="add-btn" onclick="openPostModal('${key}')">+ Ajouter un post</button></div>`;
    col.addEventListener('dragover',(e)=>{e.preventDefault();col.classList.add('drag-over');});
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',(e)=>{
      e.preventDefault();col.classList.remove('drag-over');
      if(!dragState||dragState.profile!==currentProfile)return;
      let {fromDay,fromIdx}=dragState;
      if(fromDay===key)return;
      let moved=posts[fromDay].splice(fromIdx,1)[0];
      if(posts[fromDay].length===0)delete posts[fromDay];
      if(!posts[key])posts[key]=[];
      posts[key].push(moved);
      savePosts();
      renderDayPosts(fromDay);
      renderDayPosts(key);
      renderCal();
      updateTodayBadge();
      dragState=null;
    });
    strip.appendChild(col);
    renderDayPosts(key);
  });
  applyDayColors();
}

  container.style.flexDirection='column';

  const allPosts=Object.values(posts).flat();
  const now=new Date();
  const periods=[
    {label:'Cette semaine', btn:'week', filter:p=>{

      let mon=getMonday(today);let sun=addDays(mon,6);return d>=mon&&d<=sun;
    }},
    {label:'Ce mois', btn:'month', filter:p=>{
      let k=Object.keys(posts).find(key=>(posts[key]||[]).includes(p));
      if(!k)return false;let d=new Date(k);
      return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    }},
    {label:'Tout', btn:'all', filter:()=>true}
  ];

  let activePeriod='all';

  function buildStats(filterFn){
    const subset=[];
    Object.keys(posts).forEach(k=>{ (posts[k]||[]).forEach(p=>{ if(filterFn(p,k))subset.push({p,k}); }); });
    const total=subset.length;
    const byNet={};const bySt=[0,0,0];
    subset.forEach(({p})=>{
      byNet[p.network]=(byNet[p.network]||0)+1;
      bySt[p.status||0]++;
    });
    return {total,byNet,bySt};
  }

  function render(){
    container.innerHTML='';
    const periodDiv=document.createElement('div');periodDiv.className='recap-period';
    periods.forEach(per=>{
      const btn=document.createElement('button');
      btn.className='recap-period-btn'+(activePeriod===per.btn?' active':'');
      btn.textContent=per.label;
      btn.onclick=()=>{activePeriod=per.btn;render();};
      periodDiv.appendChild(btn);
    });
    container.appendChild(periodDiv);

    const per=periods.find(p=>p.btn===activePeriod);
    const filterFn=(p,k)=>per.filter(p,k);
    const stats=buildStats(filterFn);

    const wrap=document.createElement('div');wrap.className='recap-grid';

    // Total
    const s1=document.createElement('div');
    s1.innerHTML=`<div class="recap-section-title">Total posts</div><div class="recap-cards"><div class="recap-card"><div class="recap-card-num">${stats.total}</div><div class="recap-card-label">posts planifiés</div></div></div>`;
    wrap.appendChild(s1);

    // Par statut
    const s2=document.createElement('div');
    const stLabels=[['À finaliser','st0'],['À publier','st1'],['Publié','st2']];
    s2.innerHTML=`<div class="recap-section-title">Par statut</div><div class="recap-cards">${stLabels.map(([l,cls],i)=>`<div class="recap-card ${cls}"><div class="recap-card-num">${stats.bySt[i]}</div><div class="recap-card-label">${l}</div></div>`).join('')}</div>`;
    wrap.appendChild(s2);

    // Par réseau
    const prof=PROFILES[currentProfile];
    const s3=document.createElement('div');
    const netCards=prof.networks.map(n=>`<div class="recap-card"><div class="recap-card-num">${stats.byNet[n.value]||0}</div><div class="recap-card-label">${n.label}</div></div>`).join('');
    s3.innerHTML=`<div class="recap-section-title">Par réseau</div><div class="recap-cards">${netCards}</div>`;
    wrap.appendChild(s3);

    container.appendChild(wrap);
  }
  render();
}

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if(data.influenceuse){
        localStorage.setItem('cp_posts_inf', JSON.stringify(data.influenceuse.posts||{}));
        localStorage.setItem('cp_images_inf', JSON.stringify(data.influenceuse.images||{}));
        localStorage.setItem('cp_ideas_influenceuse', JSON.stringify(data.influenceuse.ideas||[]));
      }
      if(data.dovozo){
        localStorage.setItem('cp_posts_dov', JSON.stringify(data.dovozo.posts||{}));
        localStorage.setItem('cp_images_dov', JSON.stringify(data.dovozo.images||{}));
        localStorage.setItem('cp_ideas_dovozo', JSON.stringify(data.dovozo.ideas||[]));
      }
      posts = loadPosts();
      renderSidebar();
      renderMain();
      alert('✅ Import réussi !');
    } catch(err) {
      alert('❌ Fichier invalide, vérifie qu\'il s\'agit bien d\'une sauvegarde de ce planificateur.');
    }
  };
  reader.readAsText(file);
  e.target.value='';
}

function renderIdeaCards(col, profileKey, ideas) {
  col.querySelectorAll('.idea-card').forEach(c => c.remove());

  ideas.forEach((idea, idx) => {
    const card = document.createElement('div');
    card.className = 'idea-card';
    const netLabel = NET_LABELS[idea.network] || idea.network || '';
    const netClass = 'pc-net net-' + (idea.network || '');
    card.innerHTML = `
      <div class="idea-card-header">
        <div class="idea-card-title">${idea.title || 'Idée sans titre'}</div>
        <div class="idea-card-actions">
          <button class="idea-btn plan" onclick="openPlanOverlay('${profileKey}',${idx})">📅 Planifier</button>
          <button class="idea-btn" onclick="openIdeaModal('${profileKey}',${idx})">✎</button>
          <button class="idea-btn del" onclick="deleteIdea('${profileKey}',${idx})">🗑</button>
        </div>
      </div>
      <div class="idea-meta">
        ${idea.network ? `<span class="${netClass}">${netLabel}</span>` : ''}
        ${idea.tag ? `<span class="idea-tag">${idea.tag}</span>` : ''}
      </div>
      ${idea.desc ? `<div class="idea-desc">${idea.desc}</div>` : ''}`;
    if (addBtn) col.insertBefore(card, addBtn);

function refreshIdeasView() {

  Object.keys(PROFILES).forEach(profileKey => {

function saveIdea() {
  const idea = {

    tag: document.getElementById('idea_tag').value.trim(),
    desc: document.getElementById('idea_desc').value.trim()

// ── SAUVEGARDE AUTOMATIQUE (File System Access API) ──────────────────────────
let autoSaveFileHandle = null;
let autoSaveEnabled = false;
let autoSaveDebounceTimer = null;

function getAllDataForSave() {
  return {
    influenceuse: {
      posts: JSON.parse(localStorage.getItem('cp_posts_inf') || '{}'),
      images: JSON.parse(localStorage.getItem('cp_images_inf') || '{}'),
      ideas: JSON.parse(localStorage.getItem('cp_ideas_influenceuse') || '[]')
    },
    dovozo: {
      posts: JSON.parse(localStorage.getItem('cp_posts_dov') || '{}'),
      images: JSON.parse(localStorage.getItem('cp_images_dov') || '{}'),
      ideas: JSON.parse(localStorage.getItem('cp_ideas_dovozo') || '[]')
    },
    theme: JSON.parse(localStorage.getItem('cp_theme') || '{}'),
    dayColors: JSON.parse(localStorage.getItem('cp_day_colors') || '{}')
  };
}

async function writeToFile() {
  if (!autoSaveFileHandle) return;
  try {
    const writable = await autoSaveFileHandle.createWritable();
    await writable.write(JSON.stringify(getAllDataForSave(), null, 2));
    await writable.close();
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    const el = document.getElementById('autoSaveStatus');
    el.textContent = `✓ Sauvegardé à ${h}:${m}:${s}`;
    el.style.color = '#3b6d11';
    el.style.display = 'inline';
  } catch(e) {
    console.warn('Erreur écriture fichier:', e);
  }
}

function scheduleSave() {
  if (!autoSaveEnabled || !autoSaveFileHandle) return;
  clearTimeout(autoSaveDebounceTimer);
  autoSaveDebounceTimer = setTimeout(writeToFile, 800);
}

async function toggleAutoSave() {
  if (!('showSaveFilePicker' in window)) {
    alert('❌ Votre navigateur ne supporte pas cette fonctionnalité.\nUtilisez Chrome ou Edge pour activer la sauvegarde automatique.');
    return;
  }
  if (autoSaveEnabled) {
    autoSaveEnabled = false;
    autoSaveFileHandle = null;
    document.getElementById('autoSaveBtn').textContent = '💾 Sauvegarde auto : OFF';
    document.getElementById('autoSaveBtn').style.borderColor = '';
    document.getElementById('autoSaveBtn').style.color = '';
    document.getElementById('autoSaveStatus').style.display = 'none';
    return;
  }
  try {
    const handle = await window.showSaveFilePicker({
      suggestedName: 'planification_sauvegarde.json',
      types: [{ description: 'Fichier JSON', accept: { 'application/json': ['.json'] } }]
    });
    autoSaveFileHandle = handle;
    autoSaveEnabled = true;
    const btn = document.getElementById('autoSaveBtn');
    btn.textContent = '💾 Sauvegarde auto : ON';
    btn.style.borderColor = '#3b6d11';
    btn.style.color = '#3b6d11';
    document.getElementById('autoSaveStatus').style.display = 'inline';
    await writeToFile();
  } catch(e) {
    if (e.name !== 'AbortError') console.warn('Erreur activation sauvegarde:', e);
  }
}

const FB_PROJECT = 'planification-contenu';
const FB_KEY = 'AIzaSyDglKKnNqGqDg-SdriLJ5dld5xdywlqkEw';
const FB_BASE = `https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents/data`;
let _fbSaveTimer = null;
let _fbImgSaveTimer = null;

function fbUrl(doc) { return `${FB_BASE}/${doc}?key=${FB_KEY}`; }

async function fbSet(docName, payload) {
  const body = { fields: { payload: { stringValue: JSON.stringify(payload) } } };
  const resp = await fetch(fbUrl(docName), {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
}

async function fbGet(docName) {
  const resp = await fetch(fbUrl(docName));
  if (resp.status === 404) return null;
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  const doc = await resp.json();
  if (!doc.fields || !doc.fields.payload) return null;
  return JSON.parse(doc.fields.payload.stringValue);
}

function saveToFirestore() {
  clearTimeout(_fbSaveTimer);
  _fbSaveTimer = setTimeout(async () => {
    try {
      // Document principal : posts (sans images) + idées + thème + couleurs
      const main = {
        influenceuse: {
          posts: JSON.parse(localStorage.getItem('cp_posts_inf') || '{}'),
          ideas: JSON.parse(localStorage.getItem('cp_ideas_influenceuse') || '[]')
        },
        dovozo: {
          posts: JSON.parse(localStorage.getItem('cp_posts_dov') || '{}'),
          ideas: JSON.parse(localStorage.getItem('cp_ideas_dovozo') || '[]')
        },
        theme: JSON.parse(localStorage.getItem('cp_theme') || '{}'),
        dayColors: JSON.parse(localStorage.getItem('cp_day_colors') || '{}')
      };
      await fbSet('main', main);
      showSyncStatus('✓ Synchronisé');
      // Images dans un document séparé (avec délai pour ne pas surcharger)
      clearTimeout(_fbImgSaveTimer);
      _fbImgSaveTimer = setTimeout(async () => {
        try {
          const imgs = {
            inf: JSON.parse(localStorage.getItem('cp_images_inf') || '{}'),
            dov: JSON.parse(localStorage.getItem('cp_images_dov') || '{}')
          };
          await fbSet('images', imgs);
        } catch(e) { console.warn('Images sync partielle:', e); }
      }, 3000);
    } catch(e) {
      console.warn('Erreur sync:', e);
      showSyncStatus('⚠ Erreur sync', true);
    }
  }, 1200);
}

function showSyncStatus(msg, isError) {
  let el = document.getElementById('syncStatus');
  if (!el) {
    el = document.createElement('span');
    el.id = 'syncStatus';
    el.style.cssText = 'font-size:11px;padding:4px 10px;border-radius:10px;transition:opacity .5s;position:fixed;bottom:14px;right:14px;z-index:9999;font-family:var(--day-font);box-shadow:0 2px 8px rgba(0,0,0,.1)';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.background = isError ? '#ffeaea' : '#eafad4';
  el.style.color = isError ? '#c0392b' : '#3b6d11';
  el.style.opacity = '1';
  if (!isError) setTimeout(() => { el.style.opacity = '0'; }, 3000);
}

async function loadFromFirestore() {
  try {
    showSyncStatus('⟳ Chargement...');
    // Charger données principales
    const main = await fbGet('main');
    if (main) {
      if (main.influenceuse) {
        if (main.influenceuse.posts) localStorage.setItem('cp_posts_inf', JSON.stringify(main.influenceuse.posts));
        if (main.influenceuse.ideas) localStorage.setItem('cp_ideas_influenceuse', JSON.stringify(main.influenceuse.ideas));
      }
      if (main.dovozo) {
        if (main.dovozo.posts) localStorage.setItem('cp_posts_dov', JSON.stringify(main.dovozo.posts));
        if (main.dovozo.ideas) localStorage.setItem('cp_ideas_dovozo', JSON.stringify(main.dovozo.ideas));
      }
      if (main.theme) localStorage.setItem('cp_theme', JSON.stringify(main.theme));
      if (main.dayColors) localStorage.setItem('cp_day_colors', JSON.stringify(main.dayColors));
    }
    // Charger images séparément
    const imgs = await fbGet('images');
    if (imgs) {
      if (imgs.inf) localStorage.setItem('cp_images_inf', JSON.stringify(imgs.inf));
      if (imgs.dov) localStorage.setItem('cp_images_dov', JSON.stringify(imgs.dov));
    }
    showSyncStatus(main ? '✓ Données chargées' : '✓ Prêt');
    posts = loadPosts(); theme = loadTheme(); dayColors = loadDayColors();
    applyTheme(); applyDayColors(); renderSidebar(); renderMain(); updateTodayBadge();
  } catch(e) {
    console.warn('Erreur chargement:', e);
    showSyncStatus('⚠ Hors ligne — données locales', true);
  }
}
